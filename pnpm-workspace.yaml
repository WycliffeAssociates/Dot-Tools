packages:
  - "packages/*"
  - "DotVttEditor"
  - "DotOcrApp"
  - "DotPlaylistCache"

# Reject packages published less than 7 calendar days ago (≈5 business days
# plus a weekend cushion). Applies to all deps including transitives.
# Anything we deliberately want before that window must be listed in
# `minimumReleaseAgeExclude` below.
minimumReleaseAge: 10080

# When no in-range version of a transitive dep satisfies the age policy (e.g.
# Astro just bumped to a Babel patch released yesterday and there's no older
# 7.29.x), fall back to the newest available rather than failing the install.
# Direct deps still respect the age policy because we control their ranges.
# Flip to true (or remove) for hard enforcement — and be ready to maintain
# `minimumReleaseAgeExclude`.
minimumReleaseAgeStrict: false

# Trust our own generated lockfile and skip the post-resolution verification
# pass that re-applies `minimumReleaseAge` to every entry. The age policy still
# applies during resolution (when new deps are added), but once locked the
# entries are treated as trusted. Appropriate for closed-source / single-author
# projects per the pnpm docs; flip to false if outside contributors can edit
# the lockfile or CI needs to re-verify.
trustLockfile: true

allowBuilds:
  esbuild: true
  msgpackr-extract: true
  onnxruntime-node: true
  sharp: true
  tesseract.js: true
  workerd: true

# Forced version pin carried over from DotVttEditor — older intl-messageformat
# avoids a regression with @solid-primitives/i18n.
overrides:
  intl-messageformat: "10.5.4"
